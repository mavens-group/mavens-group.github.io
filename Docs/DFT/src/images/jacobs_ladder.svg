<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="580" viewBox="0 0 640 580" font-family="Georgia, 'Times New Roman', serif">

  <!-- Background -->
  <rect width="640" height="580" fill="#fafaf8"/>

  <!-- Title -->
  <text x="320" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c2c2c">Jacob's Ladder of Exchange-Correlation Functionals</text>

  <!-- ============================================================
       LADDER RAILS  (two vertical bars, like a real ladder)
       Left rail x=88, right rail x=492, from y=60 to y=530
  ============================================================ -->
  <line x1="88"  y1="65"  x2="88"  y2="525" stroke="#8a9bb0" stroke-width="5" stroke-linecap="round"/>
  <line x1="492" y1="65"  x2="492" y2="525" stroke="#8a9bb0" stroke-width="5" stroke-linecap="round"/>

  <!-- Arrows on top of rails pointing to heaven -->
  <polygon points="88,52 82,70 94,70"  fill="#8a9bb0"/>
  <polygon points="492,52 486,70 498,70" fill="#8a9bb0"/>

  <!-- "Heaven" label -->
  <text x="320" y="50" text-anchor="middle" font-size="13" fill="#5a6a7a" font-style="italic">↑ Chemical accuracy / exact XC</text>

  <!-- "Earth" label -->
  <text x="320" y="548" text-anchor="middle" font-size="13" fill="#5a6a7a" font-style="italic">↓ Hartree approximation</text>

  <!-- ============================================================
       RUNGS  — y positions (centre of each rung box)
       Rung 0 LDA   y=490
       Rung 1 GGA   y=420
       Rung 2 mGGA  y=350
       Rung 3 Hyb   y=280
       Rung 4 DH    y=210
       Rung 5 RPA   y=140
  ============================================================ -->

  <!-- colour palette -->
  <!-- LDA: muted steel blue #4a7fa5 -->
  <!-- GGA: sage green #6a9e7a -->
  <!-- meta-GGA: muted gold #b8963e -->
  <!-- Hybrid: muted plum #7a5c8a -->
  <!-- Double-hybrid: terracotta #a0522d -->
  <!-- RPA: dark teal #3d7a7a -->

  <!-- ==== RUNG 0: LDA ==== -->
  <rect x="88" y="468" width="404" height="44" rx="4" fill="#4a7fa5" fill-opacity="0.18" stroke="#4a7fa5" stroke-width="1.5"/>
  <line x1="88" y1="490" x2="492" y2="490" stroke="#4a7fa5" stroke-width="3"/>
  <!-- left label -->
  <text x="84" y="487" text-anchor="end" font-size="13" font-weight="bold" fill="#4a7fa5">Rung 0</text>
  <!-- rung name -->
  <text x="290" y="483" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">LDA / LSDA</text>
  <text x="290" y="500" text-anchor="middle" font-size="11.5" fill="#444">PW92, VWN — ingredient: ρ</text>

  <!-- ==== RUNG 1: GGA ==== -->
  <rect x="88" y="398" width="404" height="44" rx="4" fill="#6a9e7a" fill-opacity="0.18" stroke="#6a9e7a" stroke-width="1.5"/>
  <line x1="88" y1="420" x2="492" y2="420" stroke="#6a9e7a" stroke-width="3"/>
  <text x="84" y="417" text-anchor="end" font-size="13" font-weight="bold" fill="#6a9e7a">Rung 1</text>
  <text x="290" y="413" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">GGA</text>
  <text x="290" y="430" text-anchor="middle" font-size="11.5" fill="#444">PBE, PBEsol — adds ∇ρ</text>

  <!-- ==== RUNG 2: meta-GGA ==== -->
  <rect x="88" y="328" width="404" height="44" rx="4" fill="#b8963e" fill-opacity="0.18" stroke="#b8963e" stroke-width="1.5"/>
  <line x1="88" y1="350" x2="492" y2="350" stroke="#b8963e" stroke-width="3"/>
  <text x="84" y="347" text-anchor="end" font-size="13" font-weight="bold" fill="#b8963e">Rung 2</text>
  <text x="290" y="343" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">meta-GGA</text>
  <text x="290" y="360" text-anchor="middle" font-size="11.5" fill="#444">SCAN, r²SCAN — adds τ, α</text>

  <!-- ==== RUNG 3: Hybrid ==== -->
  <rect x="88" y="258" width="404" height="44" rx="4" fill="#7a5c8a" fill-opacity="0.18" stroke="#7a5c8a" stroke-width="1.5"/>
  <line x1="88" y1="280" x2="492" y2="280" stroke="#7a5c8a" stroke-width="3"/>
  <text x="84" y="277" text-anchor="end" font-size="13" font-weight="bold" fill="#7a5c8a">Rung 3</text>
  <text x="290" y="273" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Hybrid (global / range-sep.)</text>
  <text x="290" y="290" text-anchor="middle" font-size="11.5" fill="#444">PBE0, HSE06, B3LYP — adds E&#x2093;&#x02B0;&#x02B0;</text>

  <!-- ==== RUNG 4: Double-hybrid ==== -->
  <rect x="88" y="188" width="404" height="44" rx="4" fill="#a0522d" fill-opacity="0.18" stroke="#a0522d" stroke-width="1.5"/>
  <line x1="88" y1="210" x2="492" y2="210" stroke="#a0522d" stroke-width="3"/>
  <text x="84" y="207" text-anchor="end" font-size="13" font-weight="bold" fill="#a0522d">Rung 4</text>
  <text x="290" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Double-Hybrid</text>
  <text x="290" y="220" text-anchor="middle" font-size="11.5" fill="#444">B2PLYP, PBE-QIDH — adds E&#x1D9C;&#x1DA2;&#x1DA3;</text>

  <!-- ==== RUNG 5: RPA / fully non-local ==== -->
  <rect x="88" y="118" width="404" height="44" rx="4" fill="#3d7a7a" fill-opacity="0.18" stroke="#3d7a7a" stroke-width="1.5"/>
  <line x1="88" y1="140" x2="492" y2="140" stroke="#3d7a7a" stroke-width="3"/>
  <text x="84" y="137" text-anchor="end" font-size="13" font-weight="bold" fill="#3d7a7a">Rung 5</text>
  <text x="290" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Fully non-local correlation</text>
  <text x="290" y="150" text-anchor="middle" font-size="11.5" fill="#444">RPA, ACFD — exact occupied + virtual KS orbitals</text>

  <!-- ============================================================
       RIGHT SIDE ANNOTATIONS: the two Taylor series
  ============================================================ -->

  <!-- Gradient series brace label -->
  <line x1="510" y1="140" x2="510" y2="490" stroke="#6a6a6a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="514" y="320" font-size="11" fill="#5a5a5a" transform="rotate(90,514,320)" text-anchor="middle">Gradient series (ρ, ∇ρ, τ)</text>

  <!-- Coupling-constant series brace label -->
  <line x1="536" y1="140" x2="536" y2="280" stroke="#6a6a6a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="540" y="210" font-size="11" fill="#5a5a5a" transform="rotate(90,540,210)" text-anchor="middle">Coupling-constant series</text>

  <!-- Cost arrow on left -->
  <line x1="55" y1="490" x2="55" y2="150" stroke="#9a9a9a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9a9a9a"/>
    </marker>
  </defs>
  <text x="50" y="330" font-size="11" fill="#7a7a7a" transform="rotate(-90,50,330)" text-anchor="middle">Computational cost</text>

</svg>
