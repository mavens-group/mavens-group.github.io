<svg xmlns="http://www.w3.org/2000/svg" width="700" height="520" viewBox="0 0 700 520" font-family="Georgia, 'Times New Roman', serif">

  <rect width="700" height="520" fill="#fafaf8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c2c2c">Brillouin Zone Integration: Monkhorst–Pack Mesh</text>

  <!-- ============================================================
       LEFT PANEL: 2D BZ with MP mesh and irreducible wedge
       Centre at (185, 270), BZ hexagonal side ~130
  ============================================================ -->

  <text x="185" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">(a) 2D Brillouin Zone</text>
  <text x="185" y="76" text-anchor="middle" font-size="11" fill="#666">6×6 Monkhorst–Pack mesh</text>

  <!-- Hexagonal BZ (approximate square for simplicity: square BZ) -->
  <!-- Use a square BZ for clarity: from (65,90) to (305,370) -->
  <rect x="65" y="90" width="240" height="240" rx="3" fill="#e8eef4" stroke="#4a7fa5" stroke-width="2"/>

  <!-- Irreducible wedge (triangle in top-left quarter for square BZ) -->
  <polygon points="65,90 185,90 185,210 65,210" fill="#6a9e7a" fill-opacity="0.22"/>
  <text x="125" y="157" text-anchor="middle" font-size="11" fill="#3a6a4a" font-style="italic">Irreducible</text>
  <text x="125" y="172" text-anchor="middle" font-size="11" fill="#3a6a4a" font-style="italic">wedge</text>

  <!-- 6×6 MP grid points: x from 65+20=85 step 40, y from 90+20=110 step 40 -->
  <!-- x positions: 85,125,165,205,245,285 -->
  <!-- y positions: 110,150,190,230,270,310,350 → 110..350 -->
  <!-- but BZ ends at y=330 so y: 110,150,190,230,270,310 (6 rows) -->

  <!-- Draw grid lines faint -->
  <g stroke="#b0c0d0" stroke-width="0.8" stroke-dasharray="3,3">
    <line x1="65" y1="110" x2="305" y2="110"/>
    <line x1="65" y1="150" x2="305" y2="150"/>
    <line x1="65" y1="190" x2="305" y2="190"/>
    <line x1="65" y1="230" x2="305" y2="230"/>
    <line x1="65" y1="270" x2="305" y2="270"/>
    <line x1="65" y1="310" x2="305" y2="310"/>
    <line x1="85"  y1="90" x2="85"  y2="330"/>
    <line x1="125" y1="90" x2="125" y2="330"/>
    <line x1="165" y1="90" x2="165" y2="330"/>
    <line x1="205" y1="90" x2="205" y2="330"/>
    <line x1="245" y1="90" x2="245" y2="330"/>
    <line x1="285" y1="90" x2="285" y2="330"/>
  </g>

  <!-- k-points: all 36 points, colour by wedge membership -->
  <!-- Irreducible (in wedge x≤185, y≤210): filled circles -->
  <!-- Reducible: open circles -->
  <g fill="#4a7fa5" stroke="#4a7fa5">
    <!-- Row y=110 (all in wedge if x≤185 or outside) -->
    <circle cx="85"  cy="110" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="125" cy="110" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="165" cy="110" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="205" cy="110" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="245" cy="110" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="285" cy="110" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <!-- Row y=150 -->
    <circle cx="85"  cy="150" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="125" cy="150" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="165" cy="150" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="205" cy="150" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="245" cy="150" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="285" cy="150" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <!-- Row y=190 (boundary) -->
    <circle cx="85"  cy="190" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="125" cy="190" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="165" cy="190" r="4" fill="#6a9e7a" stroke="#3a7a4a"/>
    <circle cx="205" cy="190" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="245" cy="190" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="285" cy="190" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <!-- Rows y=230,270,310 fully outside wedge -->
    <circle cx="85"  cy="230" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="125" cy="230" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="165" cy="230" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="205" cy="230" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="245" cy="230" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="285" cy="230" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="85"  cy="270" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="125" cy="270" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="165" cy="270" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="205" cy="270" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="245" cy="270" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="285" cy="270" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="85"  cy="310" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="125" cy="310" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="165" cy="310" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="205" cy="310" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="245" cy="310" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
    <circle cx="285" cy="310" r="4" fill="#4a7fa5" stroke="#2a5f85"/>
  </g>

  <!-- High-symmetry points -->
  <circle cx="65"  cy="90"  r="5" fill="#c0392b"/>
  <text x="58" y="86" font-size="12" fill="#c0392b" font-weight="bold">Γ</text>
  <circle cx="305" cy="90"  r="5" fill="#c0392b"/>
  <text x="308" y="86" font-size="12" fill="#c0392b" font-weight="bold">X</text>
  <circle cx="305" cy="330" r="5" fill="#c0392b"/>
  <text x="308" y="336" font-size="12" fill="#c0392b" font-weight="bold">M</text>
  <circle cx="65"  cy="330" r="5" fill="#c0392b"/>
  <text x="52" y="336" font-size="12" fill="#c0392b" font-weight="bold">X</text>

  <!-- BZ label -->
  <text x="185" y="356" text-anchor="middle" font-size="11.5" fill="#4a7fa5">First Brillouin Zone (BZ)</text>

  <!-- Legend for BZ panel -->
  <circle cx="75" cy="378" r="5" fill="#6a9e7a" stroke="#3a7a4a"/>
  <text x="85" y="382" font-size="11.5" fill="#3a7a4a">Irreducible k-points (×weight)</text>
  <circle cx="75" cy="396" r="5" fill="#4a7fa5" stroke="#2a5f85"/>
  <text x="85" y="400" font-size="11.5" fill="#2a5f85">Reducible k-points</text>
  <circle cx="75" cy="414" r="5" fill="#c0392b"/>
  <text x="85" y="418" font-size="11.5" fill="#c0392b">High-symmetry points</text>

  <!-- ============================================================
       RIGHT PANEL: smearing schematic
       Shows occupation function f(ε) and smeared δ(ε-εF)
       and the Fermi step at εF
       x from 370 to 660, y from 90 to 440
  ============================================================ -->

  <text x="515" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">(b) Smearing at the Fermi Level</text>
  <text x="515" y="76" text-anchor="middle" font-size="11" fill="#666">Methfessel–Paxton vs. step function</text>

  <!-- Axes -->
  <defs>
    <marker id="ar2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#444"/>
    </marker>
  </defs>
  <line x1="370" y1="300" x2="655" y2="300" stroke="#444" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="390" y1="430" x2="390" y2="88"  stroke="#444" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="660" y="304" font-size="12" fill="#444">ε</text>
  <text x="394" y="86"  font-size="12" fill="#444">f, D</text>

  <!-- εF vertical dashed -->
  <line x1="515" y1="100" x2="515" y2="430" stroke="#888" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="515" y="445" text-anchor="middle" font-size="12" fill="#666" font-style="italic">ε<tspan font-size="9" dy="3">F</tspan></text>

  <!-- Zero and 1 on y axis -->
  <line x1="386" y1="300" x2="394" y2="300"/>
  <text x="382" y="304" text-anchor="end" font-size="11" fill="#444">0</text>
  <line x1="386" y1="160" x2="394" y2="160"/>
  <text x="382" y="164" text-anchor="end" font-size="11" fill="#444">1</text>

  <!-- Sharp step function (ideal metal) — dark grey -->
  <polyline points="390,160 515,160 515,300 650,300" stroke="#999" stroke-width="1.8" fill="none" stroke-dasharray="6,4"/>
  <text x="640" y="292" font-size="11" fill="#888">θ(ε<tspan font-size="8" dy="2">F</tspan><tspan dy="-2">−ε)</tspan></text>

  <!-- Fermi-Dirac smearing — terracotta -->
  <path d="
    M 390,158
    C 430,158 455,160 475,170
    C 490,178 500,195 510,213
    C 518,228 524,255 530,280
    C 535,296 542,304 555,305
    C 580,307 620,308 650,308
  " stroke="#a0522d" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <text x="640" y="320" font-size="11" fill="#a0522d">Fermi–Dirac</text>

  <!-- MP smearing (N=1) — plum, solid -->
  <path d="
    M 390,158
    C 440,158 465,160 482,166
    C 497,172 507,186 514,208
    C 519,222 520,253 522,272
    C 524,288 528,302 536,305
    C 550,308 590,308 650,308
  " stroke="#7a5c8a" stroke-width="2.5" fill="none"/>
  <text x="640" y="335" font-size="11" fill="#7a5c8a">MP (N=1)</text>

  <!-- DOS curve D(ε) — sage green, filled -->
  <path d="
    M 395,298
    C 410,297 425,292 440,280
    C 452,270 460,250 468,225
    C 476,200 483,175 495,162
    C 503,154 508,150 512,148
    C 516,148 520,152 525,160
    C 532,172 538,195 545,220
    C 553,248 558,272 565,288
    C 572,300 582,304 600,304
    C 620,304 638,302 648,300
  " stroke="#6a9e7a" stroke-width="2" fill="#6a9e7a" fill-opacity="0.12"/>
  <text x="512" y="141" text-anchor="middle" font-size="11" fill="#3a6a4a">D(ε)</text>
  <line x1="512" y1="144" x2="512" y2="152" stroke="#3a6a4a" stroke-width="1"/>

  <!-- σ annotation -->
  <line x1="488" y1="340" x2="540" y2="340" stroke="#7a5c8a" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="540" y1="340" x2="488" y2="340" stroke="#7a5c8a" stroke-width="1.5"/>
  <text x="514" y="355" text-anchor="middle" font-size="12" fill="#7a5c8a" font-style="italic">σ (smearing width)</text>

  <!-- σ bracket ticks -->
  <line x1="488" y1="335" x2="488" y2="345" stroke="#7a5c8a" stroke-width="1.5"/>
  <line x1="540" y1="335" x2="540" y2="345" stroke="#7a5c8a" stroke-width="1.5"/>

  <!-- ============================================================
       Bottom text: convergence note
  ============================================================ -->
  <rect x="370" y="462" width="285" height="46" rx="4" fill="#f0f0ec" stroke="#ccc"/>
  <text x="512" y="479" text-anchor="middle" font-size="11.5" fill="#444">Convergence: E(σ→0) extrapolated as</text>
  <text x="512" y="497" text-anchor="middle" font-size="11.5" fill="#444">E₀ = E(σ) − TS  or via MP correction</text>

  <!-- ============================================================
       Panel A extra: MP formula note
  ============================================================ -->
  <rect x="65" y="435" width="240" height="46" rx="4" fill="#f0f0ec" stroke="#ccc"/>
  <text x="185" y="452" text-anchor="middle" font-size="11.5" fill="#444">MP formula: k_i = (2i−N−1)/(2N)</text>
  <text x="185" y="470" text-anchor="middle" font-size="11.5" fill="#444">Shifted grid avoids Γ; N_irr ≪ N_total</text>

</svg>
