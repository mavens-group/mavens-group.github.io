           arrow inside
           Output strip     top=312  bot=334
         gap 18  arrow 18
         Construct rho rect top=396  bot=446
         gap 18  arrow 18
         Diamond            top=464  cy=506   bot=548
         gap 18  arrow 18
         Output para        top=566  bot=610
         gap 18  arrow 18
         END ellipse        top=628  cy=640   bot=652
  ─────────────────────────────────────────────────────────────── -->
