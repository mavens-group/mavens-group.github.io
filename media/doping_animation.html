<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generic Site-Selective Doping & Property Tuning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Georgia', serif;
  }
  .stage {
    width: 850px;
    height: 500px;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }
  canvas { position: absolute; top: 0; left: 0; }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    align-items: center;
  }
  button {
    padding: 8px 20px;
    background: #222; color: #aaa;
    border: 1px solid #444; border-radius: 4px;
    font-family: 'Courier New', monospace; font-size: 13px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: 0.2s;
  }
  button:hover { background: #4a6890; color: #fff; border-color: #4a6890; }
  .label { color: #888; font-family: 'Courier New', monospace; font-size: 13px; }
</style>
</head>
<body>

<div class="stage">
  <canvas id="c" width="850" height="500"></canvas>
</div>
<div class="controls">
  <button onclick="restart()">&#8635; Replay Animation</button>
  <div class="label">Mechanism → Property Tuning</div>
</div>

<script>
const W = 850, H = 500;
const canvas = document.getElementById('c');
const c = canvas.getContext('2d');

// Offscreen canvas for the paper background
const paperOS = document.createElement('canvas');
paperOS.width = W; paperOS.height = H;
const pCtx = paperOS.getContext('2d');

// ─── Seeded RNG ──────────────────────────────────────────────────────────────
let _s=1;
const sr  = s  => { _s = (s|0) >>> 0; };
const rng = () => { _s=(_s*1664525+1013904223)>>>0; return _s/0xFFFFFFFF; };

// ─── Math & Hand-Drawn Paths ─────────────────────────────────────────────────
const NL=35, NC=60;

function bakeLine(x1,y1,x2,y2,seed, wobble=1.2){
  sr(seed);
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const px=-dy/len, py=dx/len;
  const pts=[];
  for(let i=0;i<NL;i++){
    const t=i/(NL-1);
    const dev=wobble*Math.sin(t*Math.PI)*(rng()*2-1);
    pts.push({x:x1+dx*t+px*dev+(rng()-.5)*0.5, y:y1+dy*t+py*dev+(rng()-.5)*0.5});
  }
  return pts;
}

function bakeBezier(x1,y1, cx,cy, x2,y2, seed, wobble=1.5){
  sr(seed);
  const pts=[];
  for(let i=0;i<NL;i++){
    const t=i/(NL-1);
    const inv = 1-t;
    // Quadratic bezier
    const bx = inv*inv*x1 + 2*inv*t*cx + t*t*x2;
    const by = inv*inv*y1 + 2*inv*t*cy + t*t*y2;
    pts.push({x: bx + (rng()-.5)*wobble, y: by + (rng()-.5)*wobble});
  }
  return pts;
}

function bakeCircle(cx,cy,r,seed){
  sr(seed);
  const pts=[];
  const a0=(rng()-.5)*0.1;
  const tot=Math.PI*2*(1+rng()*0.03);
  for(let i=0;i<NC;i++){
    const t=i/(NC-1);
    const ang=a0+t*tot;
    const rr=r*(1+(rng()-.5)*0.015)+(rng()-.5)*0.6;
    pts.push({x:cx+Math.cos(ang)*rr+(rng()-.5)*0.6, y:cy+Math.sin(ang)*rr+(rng()-.5)*0.6});
  }
  return pts;
}

function buildCrayon(cx,cy,r,seed){
  sr(seed);
  const strokes=[];
  for(let dy=-r+5; dy<r; dy+=5){
    const hw=Math.sqrt(Math.max(0,r*r-dy*dy));
    if(hw<3) continue;
    const y=cy+dy+(rng()-.5)*1.2;
    const x1=cx-hw+(rng()-.5)*2.5;
    const x2=cx+hw+(rng()-.5)*2.5;
    const nPts=10;
    const pts=[];
    for(let j=0;j<nPts;j++){
      const t=j/(nPts-1);
      pts.push({x:x1+(x2-x1)*t+(rng()-.5)*1.5, y:y+(rng()-.5)*1.2});
    }
    strokes.push(pts);
  }
  return strokes;
}

// ─── Drawing Primitives ──────────────────────────────────────────────────────
function drawStroke(ctx,pts,frac,lw,color){
  const n=Math.max(2,Math.round(pts.length*frac));
  if (n > pts.length) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<n;i++){
    if(i<n-1){
      const mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    } else ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.strokeStyle=color; ctx.lineWidth=lw;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.stroke();
}

function drawCrayon(ctx, crayonSet, cx, cy, r, frac, col){
  const total=crayonSet.length;
  const nFull=Math.floor(total*frac);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle=col; ctx.lineCap='round'; ctx.lineJoin='round';
  for(let i=0;i<nFull;i++){
    const pts=crayonSet[i];
    ctx.lineWidth=3.2+(i%3)*0.5;
    ctx.globalAlpha= (ctx.globalAlpha) * (0.75+(i%2)*0.08);
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let j=1;j<pts.length;j++) ctx.lineTo(pts[j].x,pts[j].y);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Pre-bake Lattice Data ───────────────────────────────────────────────────
const ATOMS = [
  {cx:75, cy:75, r:50, g:'corner'}, {cx:651.8, cy:75, r:50, g:'corner'},
  {cx:651.8, cy:651.8, r:50, g:'corner'}, {cx:75, cy:651.8, r:50, g:'corner'},
  {cx:363.4, cy:75, r:55, g:'face'}, {cx:363.4, cy:651.8, r:55, g:'face'},
  {cx:75, cy:363.4, r:55, g:'face'}, {cx:651.8, cy:363.4, r:55, g:'face'},
  {cx:363.4, cy:363.4, r:50, g:'face'},
  {cx:219.2, cy:219.2, r:48, g:'target'}, {cx:507.6, cy:219.2, r:48, g:'target'},
  {cx:219.2, cy:507.6, r:48, g:'target'}, {cx:507.6, cy:507.6, r:48, g:'target'},
];

const BONDS = [
  [123,75.8, 309,75.8],[416,75, 602,75],[651.8,123, 651.8,309],[651.8,416, 651.8,603],
  [75,416, 75,603],[75,123, 75,309],[128,363.4, 314,363.4],[412,363.4, 598,363.4],
  [412,651.8, 598,651.8],[123,651.8, 309,651.8],[363.4,128, 363.4,314],[363.4,412, 363.4,598],
  [110.6,110.6, 184.9,184.9],[253.5,253.5, 327.8,327.8],[400.8,112.4, 475.1,186.7],
  [540.1,251.7, 614.5,326.1],[541.9,541.9, 616.2,616.2],[399.0,399.0, 473.4,473.4],
  [251.7,540.1, 326.1,614.5],[112.4,400.8, 186.7,475.1],[112.4,326.1, 186.7,251.7],
  [251.7,186.7, 326.1,112.4],[541.9,184.9, 616.2,110.6],[399.0,327.8, 473.4,253.5],
  [253.5,473.4, 327.8,399.0],[110.6,616.2, 184.9,541.9],[400.8,616.2, 475.1,541.9],
  [540.1,475.1, 614.5,400.8]
];

const bondPts = BONDS.map((b,i)=>bakeLine(b[0],b[1],b[2],b[3],i*113+5));
ATOMS.forEach((a,i)=>{
  a.pts=bakeCircle(a.cx,a.cy,a.r,i*79+11);
  a.crayon1 = buildCrayon(a.cx, a.cy, a.r*0.85, i*333+77);
  if (a.g === 'target') a.crayon2 = buildCrayon(a.cx, a.cy, a.r*0.85, i*444+88);
});

function crayonColor(g){
  if(g==='corner') return '#4a6890';
  if(g==='face')   return '#b04a4a';
  return                  '#5b8a5b'; // Base Target
}

// ─── Pre-bake Schematics (DOS & Magnetism) ───────────────────────────────────
// DOS Plot
const dosY = bakeLine(200, 230, 200, 50, 501); // Energy Axis
const dosX = bakeLine(100, 140, 300, 140, 502); // Fermi Level (Ef)
const dosUp = bakeBezier(200, 140, 280, 100, 200, 60, 503); // Spin Up (Touches Ef)
const dosDn = bakeBezier(200, 230, 120, 190, 200, 160, 504); // Spin Dn (Gap at Ef)

// DOS Doped Plot (SGS Breakdown)
const dosDnDoped = bakeBezier(200, 210, 110, 170, 200, 130, 505); // Shifts up through Ef

// M-T Plot
const mtX = bakeLine(100, 430, 320, 430, 506); // Temp Axis
const mtY = bakeLine(100, 430, 100, 280, 507); // Mag Axis
const mtCurve1 = bakeBezier(100, 310, 220, 310, 250, 430, 508); // Base Tc
const mtCurve2 = bakeBezier(100, 340, 260, 340, 290, 430, 509); // Shifted Tc

// Arrows
const arr1 = bakeLine(440, 160, 500, 160, 1001);
const arr1h1 = bakeLine(500, 160, 485, 150, 1002);
const arr1h2 = bakeLine(500, 160, 485, 170, 1003);

const tcArrow = bakeLine(250, 410, 285, 410, 1004);
const tcArrowH1 = bakeLine(285, 410, 275, 405, 1005);
const tcArrowH2 = bakeLine(285, 410, 275, 415, 1006);

// ─── Paper Background ────────────────────────────────────────────────────────
function drawPaper(ctx){
  ctx.fillStyle='#f0ece0'; ctx.fillRect(0,0,W,H);
  sr(777);
  const id=ctx.createImageData(W,H);
  for(let i=0;i<id.data.length;i+=4){
    const n=(rng()-.5)*18;
    id.data[i]=240+n; id.data[i+1]=236+n; id.data[i+2]=224+n; id.data[i+3]=255;
  }
  ctx.putImageData(id,0,0);
  const vg=ctx.createRadialGradient(W/2,H/2,W*.25,W/2,H/2,W*.8);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.1)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}
drawPaper(pCtx);

// ─── Animation Loop ──────────────────────────────────────────────────────────
let time = 0;
let rafId;

function animate() {
  time += 0.015; // Speed multiplier

  c.drawImage(paperOS, 0, 0);

  // -- LATTICE PHASE (0 to 5.0) --
  // Fades out between t=4.0 and t=5.0
  const latticeAlpha = time > 4.0 ? Math.max(0, 1.0 - (time - 4.0)*1.5) : 1.0;

  if (latticeAlpha > 0.01) {
    c.save();
    c.globalAlpha = latticeAlpha;
    c.translate(240, 250);
    c.scale(0.55, 0.55);
    c.translate(-363.4, -363.4);

    // Draw Bonds
    let bondAlpha = time > 1.0 ? Math.max(0.15, 1.0 - (time - 1.0)*1.5) : 1.0;
    c.globalAlpha = bondAlpha * latticeAlpha;
    const bondDrawFrac = Math.min(1.0, time * 2);
    bondPts.forEach(pts => drawStroke(c, pts, bondDrawFrac, 5, '#333'));

    // Draw Atoms
    ATOMS.forEach(a => {
      let alpha = (a.g !== 'target' && time > 1.0) ? Math.max(0.12, 1.0 - (time - 1.0)*1.5) : 1.0;
      c.globalAlpha = alpha * latticeAlpha;

      c.fillStyle = '#f0ece0';
      c.beginPath(); c.arc(a.cx, a.cy, a.r*0.85, 0, Math.PI*2); c.fill();

      const sketchFrac = Math.min(1.0, time * 1.5);
      drawCrayon(c, a.crayon1, a.cx, a.cy, a.r*0.85, sketchFrac, crayonColor(a.g));

      if (a.g === 'target' && time > 2.0) {
        const morphFrac = Math.min(1.0, (time - 2.0)*1.5);
        c.globalAlpha = morphFrac * latticeAlpha;
        drawCrayon(c, a.crayon2, a.cx, a.cy, a.r*0.85, 1.0, '#d98b2b'); // Dopant (Gold)
      }

      c.globalAlpha = alpha * latticeAlpha;
      drawStroke(c, a.pts, sketchFrac, 3, '#222');
    });
    c.restore();
  }

  // -- SCHEMATICS PHASE (t > 4.5) --
  if (time > 4.5) {
    const sAlpha = Math.min(1.0, (time - 4.5) * 1.5);
    c.globalAlpha = sAlpha;

    // DOS PLOT (Top Left)
    drawStroke(c, dosY, 1.0, 2, '#444');
    drawStroke(c, dosX, 1.0, 1.5, '#444'); // Ef
    drawStroke(c, dosUp, sAlpha, 3, '#4a6890'); // Base up
    drawStroke(c, dosDn, sAlpha, 3, '#5b8a5b'); // Base dn

    c.font = 'italic 14px Georgia, serif'; c.fillStyle = '#444';
    c.fillText("E", 185, 55);
    c.fillText("DOS", 290, 155);
    c.fillText("E_F", 90, 145);

    // Morph DOS (SGS Breakdown)
    if (time > 5.5) {
      const morph = Math.min(1.0, time - 5.5);
      // Ghost out old line
      c.globalAlpha = Math.max(0.2, 1.0 - morph) * sAlpha;
      drawStroke(c, dosDn, 1.0, 3, '#5b8a5b');

      // Draw new broken state in dopant color
      c.globalAlpha = morph * sAlpha;
      drawStroke(c, dosDnDoped, morph, 3.5, '#d98b2b');

      c.font = 'bold 16px "Caveat", cursive'; c.fillStyle = '#d98b2b';
      c.fillText("SGS Breakdown", 80, 210);
    }

    c.globalAlpha = sAlpha;

    // M-T PLOT (Bottom Left)
    drawStroke(c, mtX, 1.0, 2, '#444');
    drawStroke(c, mtY, 1.0, 2, '#444');
    drawStroke(c, mtCurve1, sAlpha, 3.5, '#4a6890');

    c.font = 'italic 14px Georgia, serif'; c.fillStyle = '#444';
    c.fillText("M", 85, 285);
    c.fillText("T", 325, 435);
    c.font = '14px "Courier New", monospace';
    c.fillText("Tc", 240, 445);

    // Shift M-T (Tc Tuning)
    if (time > 6.0) {
      const morph2 = Math.min(1.0, time - 6.0);
      c.globalAlpha = morph2 * sAlpha;
      drawStroke(c, mtCurve2, morph2, 3.5, '#d98b2b');

      drawStroke(c, tcArrow, morph2, 2, '#d98b2b');
      drawStroke(c, tcArrowH1, morph2, 2, '#d98b2b');
      drawStroke(c, tcArrowH2, morph2, 2, '#d98b2b');

      c.font = '14px "Courier New", monospace'; c.fillStyle = '#d98b2b';
      c.fillText("Tc'", 285, 445);
      c.font = 'bold 16px "Caveat", cursive';
      c.fillText("Tuning Phase Transition", 130, 360);
    }
  }

  // -- ANNOTATIONS PHASE (t > 2.5) --
  if (time > 2.5) {
    const textAlpha = Math.min(1.0, (time - 2.5)*2);
    c.globalAlpha = textAlpha;

    // Central Arrow
    drawStroke(c, arr1, 1.0, 3, '#333');
    drawStroke(c, arr1h1, 1.0, 3, '#333');
    drawStroke(c, arr1h2, 1.0, 3, '#333');

    // Right Side Text
    c.font = 'bold 34px "Caveat", cursive';
    c.fillStyle = '#111';
    c.fillText("Site-Selective Doping", 520, 160);

    c.font = '24px "Caveat", cursive';
    c.fillStyle = '#d98b2b';
    c.fillText("Targeted Chemical Substitution", 520, 200);

    c.fillStyle = '#444';
    // Dynamically show bullet points based on timeline
    if (time > 3.0) {
        c.globalAlpha = Math.min(1.0, (time - 3.0)*2);
        c.fillText("→ Modifies local exchange interactions", 530, 250);
    }
    if (time > 4.5) {
        c.globalAlpha = Math.min(1.0, (time - 4.5)*2);
        c.fillText("→ Drives SGS state breakdown", 530, 285);
    }
    if (time > 6.0) {
        c.globalAlpha = Math.min(1.0, (time - 6.0)*2);
        c.fillText("→ Shifts Curie Temperature (Tc)", 530, 320);
    }

    c.globalAlpha = textAlpha;
    c.font = 'italic 16px Georgia, serif';
    c.fillStyle = '#666';
    c.fillText("Design handle for complex Heusler/HEAs", 520, 380);
  }

  c.globalAlpha = 1.0;

  if (time < 8.0) { // Extended timeline for all phases
    rafId = requestAnimationFrame(animate);
  }
}

function restart() {
  cancelAnimationFrame(rafId);
  time = 0;
  animate();
}

// Start animation once font is likely loaded
setTimeout(() => restart(), 300);

</script>
</body>
</html>
