        <line x1="10"   y1="0" x2="10"   y2="-8"/>
        <line x1="55"   y1="0" x2="55"   y2="-8"/>
        <line x1="100"  y1="0" x2="100"  y2="-8"/>
      </g>
    </g>
  </g>

  <!-- Hairline rule separating columns, like the DFT triptych dividers -->
