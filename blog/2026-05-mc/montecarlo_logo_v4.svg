<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1920"
   height="1080"
   viewBox="0 0 1920 1080"
   version="1.1"
   id="svg_mc"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs_mc">
    <!-- subtle vignette: same trick as the triptych light bg -->
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="60%">
      <stop offset="0%"  stop-color="#f1f1f1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e6e6e6" stop-opacity="1"/>
    </radialGradient>
    <!-- Arrowhead for the walk's terminal point -->
    <marker id="walkArrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#37474f"/>
    </marker>
  </defs>

  <style id="style_mc">
    /* Identical class vocabulary to dft_logo_spd_triptych so the visual family reads */
    .nd  { fill: #263238; stroke: #546e7a; stroke-width: 1.3; }
    .ndb { fill: #37474f; stroke: #78909c; stroke-width: 1.4; }
    .ndL { fill: #455a64; stroke: #78909c; stroke-width: 1.1; }   /* sample-point light */
    .ed  { stroke: #546e7a; stroke-width: 1.2; fill: none; opacity: 0.85; }
    .ef  { stroke: #455a64; stroke-width: 0.9; fill: none; opacity: 0.5; }
    .lp  { fill: none; stroke: #607d8b; stroke-width: 1.6; }
    .lpf { fill: #cfd8dc; fill-opacity: 0.35; stroke: #607d8b; stroke-width: 1.6; }
    .lpd { fill: none; stroke: #607d8b; stroke-width: 1.6; stroke-dasharray: 5 4; opacity: 0.7; }
    .hr  { fill: none; stroke: #546e7a; stroke-width: 1.3; opacity: 0.65; }
    .nuc { fill: #546e7a; stroke: #90a4ae; stroke-width: 2.0; }
    .pip { fill: #263238; stroke: #455a64; stroke-width: 1.4; }
    .axis{ stroke: #546e7a; stroke-width: 1.1; fill: none; opacity: 0.55; stroke-dasharray: 3 3; }
    .curve { fill: none; stroke: #455a64; stroke-width: 1.8; opacity: 0.75; }
    .curveFill { fill: #546e7a; fill-opacity: 0.10; stroke: none; }

    .lbl { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
           font-size: 93px; font-weight: 500; fill: #37474f;
           letter-spacing: 3px; text-anchor: start; }
    .lbs { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
           font-size: 48px; font-weight: 400; fill: #546e7a;
           letter-spacing: 1.5px; text-anchor: middle; }
    .lbm { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
           font-size: 56px; font-weight: 400; fill: #607d8b;
           letter-spacing: 2px; text-anchor: middle; }
    .lbtiny { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
              font-size: 26px; font-weight: 400; fill: #78909c;
              letter-spacing: 1.5px; text-anchor: middle; font-style: italic; }
  </style>

  <rect width="1920" height="1080" fill="url(#bgGlow)" id="bg"/>

  <!-- ════════════════════════════════════════════════════════════
       LEFT BLOCK  ·  Title
       ════════════════════════════════════════════════════════════ -->
  <g id="title">
    <text class="lbl" x="118" y="430">MONTE</text>
    <text class="lbl" x="118" y="540">CARLO</text>
    <!-- thin underline rule, echoing the schematic vocabulary -->
    <line x1="120" y1="572" x2="640" y2="572"
          stroke="#607d8b" stroke-width="1.6" opacity="0.85"/>
    <text class="lbm" x="378" y="638" style="text-anchor:start;">METHODS</text>

    <!-- author block, same hierarchy as triptych -->
    <text class="lbs" x="378" y="780" style="text-anchor:start;">Lecture Notes</text>
    <text class="lbs" x="378" y="838" style="text-anchor:start; font-size:42px;">Dr Rudra Banerjee</text>
    <text class="lbs" x="378" y="884" style="text-anchor:start; font-size:36px; fill:#78909c;">MAVENs group · SRMIST</text>

    <!-- Tiny epigraph in the upper-left corner, like a margin note -->
    <text class="lbtiny" x="240" y="222" style="text-anchor:start;">⟨ f ⟩ ≈ (1/N) Σ f(xᵢ)</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════
       CENTRAL EMBLEM  ·  Wireframe die  +  random-walk sampling
       Center at (1280, 540); die is isometric, ~520px tall
       ════════════════════════════════════════════════════════════ -->
  <g id="emblem" transform="translate(1280,540)">

    <!-- Outer guide ring (echoes the lp circles in DFT s-orbital) -->
    <circle class="lp" cx="0" cy="0" r="430" opacity="0.55"/>
    <circle class="hr" cx="0" cy="0" r="380"/>

    <!-- Faint axis crosshair, like the DFT diagrams' construction axes -->
    <line class="axis" x1="-430" y1="0" x2="430" y2="0"/>
    <line class="axis" x1="0" y1="-430" x2="0" y2="430"/>

    <!-- Sample-point cloud: positioned in the regions NOT occupied by the
         walk (right side, top, bottom). Inside-the-circle = filled (accepted);
         outside = open rings (rejected). -->
    <g id="samples" opacity="0.9">
      <!-- inside the inscribed circle (accepted) -->
      <circle class="ndL" cx="-200"  cy="330"  r="2.8"/>
      <circle class="ndL" cx=" 30"   cy="380"  r="2.8"/>
      <circle class="ndL" cx="160"   cy="350"  r="2.8"/>
      <circle class="ndL" cx="250"   cy="305"  r="2.8"/>
      <circle class="ndL" cx="340"   cy="180"  r="2.8"/>
      <circle class="ndL" cx="370"   cy=" 50"  r="2.8"/>
      <circle class="ndL" cx="385"   cy="-90"  r="2.8"/>
      <circle class="ndL" cx="355"   cy="-180" r="2.8"/>
      <circle class="ndL" cx="280"   cy="-280" r="2.8"/>
      <circle class="ndL" cx="140"   cy="-365" r="2.8"/>
      <circle class="ndL" cx="-60"   cy="-385" r="2.8"/>
      <circle class="ndL" cx="-180"  cy="-345" r="2.8"/>
      <circle class="ndL" cx="-290"  cy="-260" r="2.8"/>
      <!-- outside the inscribed circle (rejected — open rings) -->
      <circle class="ef" cx="-380" cy="280"  r="3.2" stroke-width="1.2"/>
      <circle class="ef" cx="380"  cy="280"  r="3.2" stroke-width="1.2"/>
      <circle class="ef" cx="420"  cy="-200" r="3.2" stroke-width="1.2"/>
      <circle class="ef" cx="420"  cy="200"  r="3.2" stroke-width="1.2"/>
      <circle class="ef" cx="-100" cy="-410" r="3.2" stroke-width="1.2"/>
      <circle class="ef" cx="100"  cy="410"  r="3.2" stroke-width="1.2"/>
    </g>

    <!-- ─── MCMC random-walk trajectory (v4) ─────────────────────────
         379-step Gaussian-increment walk spanning the full disk.
         Drift ≈ 30px on a 400px-radius disk (essentially zero).
         Coverage: 131/440 grid cells, x-extent 722, y-extent 788.
         Increased transparency (opacity 0.45) and thinner stroke
         so the walk reads as a faint cloud-like trace beneath the
         die rather than a dominant line. ───────────────────────── -->
    <g id="walk">
      <!-- Long random walk (379 steps) spanning the full disk. -->
      <polyline
        points="0.0,360.0 6.5,383.7 -33.2,373.2 -107.0,381.8 -106.0,349.9 -99.0,372.1 -108.2,363.2 -118.8,379.8 -125.0,371.4 -114.9,380.6 -110.1,367.0 -99.7,355.5 -103.2,316.8 -101.9,279.7 -104.3,247.2 -81.8,251.5 -64.3,211.4 -88.9,201.0 -140.9,200.5 -121.6,202.7 -97.2,187.0 -137.6,190.7 -122.1,175.5 -93.0,175.0 -85.6,144.8 -84.1,130.3 -105.0,128.3 -118.3,136.7 -129.1,152.3 -157.1,154.8 -138.8,166.6 -157.3,165.4 -188.9,171.3 -162.2,182.6 -194.0,201.7 -193.1,192.6 -161.1,172.4 -172.6,220.2 -122.2,272.2 -124.7,298.3 -136.3,337.3 -134.9,310.2 -167.8,347.4 -148.9,317.4 -131.5,341.4 -132.6,312.1 -111.8,324.3 -103.4,318.6 -133.8,330.8 -154.0,316.9 -145.7,274.2 -172.1,312.3 -182.1,294.3 -171.9,285.3 -217.1,239.4 -189.3,244.8 -197.3,304.9 -176.2,356.1 -154.3,360.5 -180.4,339.7 -163.9,342.4 -164.3,311.8 -180.3,333.0 -184.0,354.6 -192.7,313.9 -290.4,270.8 -278.5,247.2 -310.1,245.0 -270.3,285.4 -248.1,279.0 -208.6,263.0 -214.0,261.7 -235.6,247.0 -209.8,256.1 -249.5,247.0 -245.0,212.4 -248.7,215.4 -258.1,219.5 -247.6,212.3 -209.0,215.6 -217.3,239.3 -209.5,230.1 -198.7,209.1 -170.6,181.3 -173.4,151.8 -156.3,179.1 -148.6,164.8 -180.4,196.3 -168.5,182.4 -203.0,165.3 -229.5,153.3 -227.6,136.8 -306.6,88.2 -303.5,116.7 -306.2,59.0 -324.9,42.6 -331.7,34.9 -284.4,48.9 -261.1,67.6 -210.3,65.6 -208.6,66.5 -178.7,79.2 -152.6,70.8 -174.2,64.5 -161.5,65.2 -172.2,49.7 -202.2,15.9 -220.9,1.7 -266.2,-6.3 -278.4,3.2 -292.9,-12.0 -331.7,-3.9 -312.4,11.0 -311.2,18.0 -315.1,38.4 -324.0,39.8 -345.4,46.0 -360.7,63.2 -351.8,59.5 -362.1,76.6 -355.3,63.1 -350.6,77.1 -336.9,68.3 -338.0,98.3 -339.2,124.6 -298.7,163.4 -295.8,157.7 -330.9,193.9 -337.5,170.1 -292.8,175.4 -357.1,155.3 -343.2,151.4 -328.3,166.3 -284.0,172.6 -230.6,192.4 -208.7,178.0 -161.1,176.9 -140.9,216.0 -160.1,247.5 -145.4,277.6 -42.4,345.6 -42.3,367.6 -22.8,396.9 -54.1,368.4 -61.9,354.2 -31.3,345.3 -37.5,319.9 6.0,316.6 31.5,280.3 17.6,257.1 7.6,258.6 1.2,241.7 10.9,258.3 22.2,211.3 40.9,195.3 11.4,199.0 -8.5,218.4 0.2,224.7 -33.0,215.9 -20.5,209.9 -5.6,204.6 59.2,198.5 101.8,181.6 139.5,149.4 142.4,147.9 149.9,123.8 164.8,125.7 122.8,110.5 148.9,110.1 122.5,104.9 104.9,108.6 131.9,96.1 118.1,103.3 115.9,78.3 86.9,40.8 87.7,48.5 80.8,52.2 105.6,45.0 96.0,53.9 118.2,31.3 82.6,38.0 111.1,24.3 134.4,-15.0 117.7,-25.6 72.4,-72.9 93.9,-92.2 132.6,-87.3 65.3,-64.3 56.1,-39.4 14.0,-69.3 15.3,-74.3 29.8,-87.3 37.6,-95.8 53.4,-83.2 37.7,-103.3 66.8,-114.2 39.6,-112.7 35.1,-160.3 39.1,-170.3 37.3,-170.4 57.7,-144.6 22.8,-108.8 45.8,-114.9 26.7,-136.9 24.5,-153.7 55.9,-234.5 73.2,-228.9 71.7,-192.1 88.0,-187.4 73.9,-195.9 59.3,-195.4 42.3,-168.4 72.7,-185.5 82.9,-177.6 123.4,-162.7 118.2,-142.0 108.6,-105.0 119.5,-97.6 130.2,-126.7 156.4,-120.8 160.4,-57.2 151.7,-30.8 151.8,-40.3 158.0,-58.4 144.2,-66.0 141.3,-83.7 143.3,-104.6 182.4,-94.6 218.2,-106.6 245.0,-99.8 276.4,-110.2 321.3,-124.4 351.4,-143.5 315.0,-149.1 330.4,-107.5 330.7,-106.6 360.3,-132.4 290.5,-107.6 293.2,-102.8 273.6,-126.8 276.5,-107.1 275.3,-128.7 257.7,-92.8 260.2,-78.7 256.5,-77.1 233.3,-65.3 245.1,-82.3 235.2,-94.6 235.3,-100.8 231.6,-102.8 260.9,-146.2 266.1,-134.3 298.8,-155.8 311.7,-130.1 268.8,-156.3 258.9,-147.7 263.9,-166.3 261.5,-168.4 250.0,-187.8 231.2,-201.9 216.9,-176.0 194.5,-157.9 230.2,-185.3 217.5,-167.0 193.6,-183.5 225.3,-181.9 260.3,-185.7 252.2,-215.2 249.4,-251.7 284.7,-263.7 290.3,-257.1 253.6,-253.5 216.5,-219.1 241.4,-226.2 219.9,-254.6 249.0,-268.8 248.5,-254.4 247.3,-227.1 180.8,-297.9 185.3,-335.1 157.3,-336.3 113.2,-334.5 103.4,-344.1 110.9,-365.4 91.4,-383.2 88.4,-372.9 164.1,-350.0 151.8,-356.4 161.6,-346.2 134.7,-372.6 162.4,-338.2 172.0,-337.2 164.9,-362.8 152.8,-350.7 142.9,-361.4 190.3,-350.9 190.2,-350.5 183.3,-320.2 241.1,-271.5 206.5,-290.2 240.2,-316.5 226.5,-307.6 224.3,-320.9 195.6,-294.2 161.2,-328.7 159.1,-321.0 158.6,-338.6 124.7,-311.5 105.9,-315.7 118.1,-350.0 100.6,-328.3 107.6,-340.9 78.3,-333.9 110.3,-368.8 98.3,-368.1 113.3,-344.1 86.6,-314.2 117.2,-336.2 102.8,-327.6 109.0,-354.3 119.8,-352.0 93.3,-362.4 94.9,-383.1 76.8,-391.4 36.2,-381.7 29.1,-377.4 58.2,-358.4 76.4,-333.7 73.6,-332.1 78.7,-311.8 114.9,-319.7 83.9,-324.4 81.2,-329.8 85.0,-358.5 68.0,-372.4 54.6,-344.3 56.2,-329.2 50.0,-348.2 39.6,-349.8 37.2,-324.3 -6.4,-345.4 -33.8,-344.7 -57.6,-330.6 -53.0,-351.9 -81.9,-355.6 -108.1,-342.7 -159.2,-332.1 -180.4,-317.6 -199.3,-269.7 -224.1,-237.9 -232.6,-249.2 -218.5,-241.2 -243.7,-230.0 -242.6,-239.6 -192.5,-266.8 -195.2,-227.8 -157.0,-253.0 -145.3,-262.0 -163.7,-282.2 -108.5,-301.4 -90.7,-303.3 -97.2,-307.9 -98.8,-326.2 -105.3,-333.9 -93.7,-313.1 -100.4,-333.1 -90.1,-302.5 -104.8,-330.9 -95.9,-304.0 -101.0,-350.1 -128.9,-280.3 -133.0,-273.3 -169.1,-292.8 -170.3,-315.9 -190.9,-291.8 -198.1,-287.1 -210.4,-243.6 -106.9,-241.1 -90.4,-273.7"
        fill="none"
        stroke="#37474f"
        stroke-width="1.1"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.45"
        marker-end="url(#walkArrow)"/>
      <g id="chain_states">
        <circle class="nd" cx="-104.3" cy="247.2" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-129.1" cy="152.3" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-167.8" cy="347.4" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-197.3" cy="304.9" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-208.6" cy="263.0" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-173.4" cy="151.8" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-261.1" cy="67.6" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-312.4" cy="11.0" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-295.8" cy="157.7" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-42.4" cy="345.6" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="40.9" cy="195.3" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="148.9" cy="110.1" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="134.4" cy="-15.0" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="39.6" cy="-112.7" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="59.3" cy="-195.4" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="144.2" cy="-66.0" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="293.2" cy="-102.8" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="298.8" cy="-155.8" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="260.3" cy="-185.7" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="157.3" cy="-336.3" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="142.9" cy="-361.4" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="105.9" cy="-315.7" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="94.9" cy="-383.1" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="56.2" cy="-329.2" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-232.6" cy="-249.2" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-93.7" cy="-313.1" r="2.2" opacity="0.7"/>
        <circle class="nd" cx="-90.4" cy="-273.7" r="2.2" opacity="0.7"/>
      </g>
      <!-- Start marker: filled square at x₀ = (0, 360) -->
      <rect x="-7.0" y="353.0" width="14" height="14"
            fill="#263238" stroke="#90a4ae" stroke-width="1.6"/>
      <text x="12.0" y="368.0"
            font-family="system-ui, sans-serif" font-size="22"
            fill="#546e7a" font-style="italic"
            text-anchor="start">x₀</text>
      <text x="-102.4" y="-281.7"
            font-family="system-ui, sans-serif" font-size="22"
            fill="#546e7a" font-style="italic"
            text-anchor="end">x_N</text>
    </g>

    <!-- ─── Isometric die, center (0,0), constructed from three rhombus faces.
         Edge length ≈ 200.  We use the isometric triple-axis projection:
         right vector = ( 173,  100)   (cos30, sin30)
         left  vector = (-173,  100)
         up    vector = (   0, -200)
         The top vertex is (0,-200).  The die sits centered. ───────────── -->

    <!-- Opaque hexagonal backdrop behind the die: prevents the walk
         polyline (which spans the whole disk) from showing through the
         semi-transparent die faces. Color matches the background gradient. -->
    <polygon
      points="0,-200  173,-100  173,100  0,200  -173,100  -173,-100"
      fill="#ededed"
      stroke="none"/>

    <!-- TOP face (rhombus): vertices top, right-top, center, left-top -->
    <polygon class="lpf"
             points="0,-200  173,-100  0,0  -173,-100"
             id="face_top"/>

    <!-- LEFT face (rhombus): left-top, center, bottom, left-bottom -->
    <polygon class="lpf"
             points="-173,-100  0,0  0,200  -173,100"
             id="face_left"
             style="fill-opacity:0.55;"/>

    <!-- RIGHT face (rhombus): center, right-top, right-bottom, bottom -->
    <polygon class="lpf"
             points="0,0  173,-100  173,100  0,200"
             id="face_right"
             style="fill-opacity:0.25;"/>

    <!-- Hidden back edges, dashed (technical-drawing convention) -->
    <line class="lpd" x1="-173" y1="-100" x2="0" y2="-200"/>
    <line class="lpd" x1="0"    y1="-200" x2="173" y2="-100"/>
    <line class="lpd" x1="-173" y1="-100" x2="-173" y2="100"/>
    <!-- Re-draw the visible edges crisply on top -->
    <g id="die_edges" fill="none" stroke="#37474f" stroke-width="2.4"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- top rhombus outline -->
      <polygon points="0,-200  173,-100  0,0  -173,-100"/>
      <!-- left face outline -->
      <polygon points="-173,-100  0,0  0,200  -173,100"/>
      <!-- right face outline -->
      <polygon points="0,0  173,-100  173,100  0,200"/>
    </g>

    <!-- ─── DIE PIPS ────────────────────────────────────────────────────
         The three visible faces show 1 (top), 2 (left), 3 (right).
         1·2·3 = 6 ≡ "die" reads instantly, and the numbering is the
         canonical Western convention.
         We compute pip positions in the face's local rhombic coordinates
         using two basis vectors per face. ─────────────────────────────── -->

    <!-- TOP face = 1 pip (centered on the rhombus)
         Center of top rhombus = average of its 4 verts = (0, -100) -->
    <circle class="pip" cx="0" cy="-100" r="14"/>

    <!-- LEFT face = 2 pips.
         Basis: u = (173,100)/3 along the "down-right" rhombus diagonal direction
                v = (0,200)/3   along the "down" rhombus diagonal direction
         Center of left rhombus = (-86.5, 50).
         Two pips along the face's diagonal (top-back to bottom-front).
         Use offsets (-50,-30) and (+50,+30) from the face center. -->
    <g id="left_pips">
      <circle class="pip" cx="-130" cy="22"  r="12"/>
      <circle class="pip" cx="-43"  cy="78"  r="12"/>
    </g>

    <!-- RIGHT face = 3 pips, on the face's anti-diagonal -->
    <g id="right_pips">
      <circle class="pip" cx="43"   cy="22"  r="11"/>
      <circle class="pip" cx="86"   cy="50"  r="11"/>
      <circle class="pip" cx="130"  cy="78"  r="11"/>
    </g>

    <!-- "Nucleus"-style central anchor dot on the die's top vertex,
         tying back to the .nuc convention used in DFT logos -->
    <circle class="nuc" cx="0" cy="-200" r="6"/>

    <!-- ─── Probability-density arc beneath the die ─────────────────────
         A small bell-curve that traces along the bottom guide arc,
         hinting at "distribution sampling". -->
    <g id="pdf" transform="translate(0,310)" opacity="0.85">
      <!-- baseline -->
      <line x1="-180" y1="0" x2="180" y2="0"
            stroke="#546e7a" stroke-width="1.0" opacity="0.6"/>
      <!-- filled gaussian -->
      <path class="curveFill"
            d="M -180,0
               C -120,0 -90,-90 0,-90
               C 90,-90 120,0 180,0 Z"/>
      <path class="curve"
            d="M -180,0
               C -120,0 -90,-90 0,-90
               C 90,-90 120,0 180,0"/>
      <!-- tick marks (samples drawn from the pdf) -->
      <g stroke="#37474f" stroke-width="1.4" opacity="0.7">
        <line x1="-120" y1="0" x2="-120" y2="-8"/>
        <line x1="-70"  y1="0" x2="-70"  y2="-8"/>
