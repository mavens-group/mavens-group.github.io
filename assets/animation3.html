<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Learning Materials Discovery Sequence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    font-family: 'Georgia', serif;
    box-sizing: border-box;
  }
  .stage {
    width: 100%;
    max-width: 800px;
    aspect-ratio: 1 / 1;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    background: #f0ece0;
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 10px 24px;
    background: #222; color: #aaa;
    border: 1px solid #444; border-radius: 4px;
    font-family: 'Courier New', monospace; font-size: 14px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: 0.2s;
  }
  button:hover { background: #3d85c6; color: #fff; border-color: #3d85c6; }
  .label { color: #888; font-family: 'Courier New', monospace; font-size: 14px; text-align: center;}
</style>
</head>
<body>

<div class="stage">
  <canvas id="c" width="1080" height="1080"></canvas>
</div>
<div class="controls">
  <button onclick="restart()">&#8635; Replay Sequence</button>
  <div class="label">Act I: ML Architecture &rarr; Act II: Validation &rarr; Act III: Insights</div>
</div>

<script>
const W = 1080, H = 1080;
const canvas = document.getElementById('c');
const c = canvas.getContext('2d');

const paperOS = document.createElement('canvas');
paperOS.width = W; paperOS.height = H;
const pCtx = paperOS.getContext('2d');

// ─── Seeded RNG ──────────────────────────────────────────────────────────────
let _s=1;
const sr  = s  => { _s = (s|0) >>> 0; };
const rng = () => { _s=(_s*1664525+1013904223)>>>0; return _s/0xFFFFFFFF; };

// ─── Math & Hand-Drawn Paths ─────────────────────────────────────────────────
const NL=35, NC=60;

function bakeLine(x1,y1,x2,y2,seed, wobble=1.5){
  sr(seed);
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const px=-dy/len, py=dx/len;
  const pts=[];
  for(let i=0;i<NL;i++){
    const t=i/(NL-1);
    const dev=wobble*Math.sin(t*Math.PI)*(rng()*2-1);
    pts.push({x:x1+dx*t+px*dev+(rng()-.5)*0.5, y:y1+dy*t+py*dev+(rng()-.5)*0.5});
  }
  return pts;
}

function bakeBezier(x1,y1, cx,cy, x2,y2, seed, wobble=2.0){
  sr(seed);
  const pts=[];
  for(let i=0;i<NL;i++){
    const t=i/(NL-1);
    const inv = 1-t;
    const bx = inv*inv*x1 + 2*inv*t*cx + t*t*x2;
    const by = inv*inv*y1 + 2*inv*t*cy + t*t*y2;
    pts.push({x: bx + (rng()-.5)*wobble, y: by + (rng()-.5)*wobble});
  }
  return pts;
}

function bakeCircle(cx,cy,r,seed){
  sr(seed);
  const pts=[];
  const a0=(rng()-.5)*0.1;
  const tot=Math.PI*2*(1+rng()*0.03);
  for(let i=0;i<NC;i++){
    const t=i/(NC-1);
    const ang=a0+t*tot;
    const rr=r*(1+(rng()-.5)*0.015)+(rng()-.5)*0.6;
    pts.push({x:cx+Math.cos(ang)*rr+(rng()-.5)*0.6, y:cy+Math.sin(ang)*rr+(rng()-.5)*0.6});
  }
  return pts;
}

function buildCrayon(cx,cy,r,seed){
  sr(seed);
  const strokes=[];
  for(let dy=-r+5; dy<r; dy+=5){
    const hw=Math.sqrt(Math.max(0,r*r-dy*dy));
    if(hw<3) continue;
    const y=cy+dy+(rng()-.5)*1.2;
    const x1=cx-hw+(rng()-.5)*2.5;
    const x2=cx+hw+(rng()-.5)*2.5;
    const nPts=12;
    const pts=[];
    for(let j=0;j<nPts;j++){
      const t=j/(nPts-1);
      pts.push({x:x1+(x2-x1)*t+(rng()-.5)*1.5, y:y+(rng()-.5)*1.2});
    }
    strokes.push(pts);
  }
  return strokes;
}

function drawStroke(ctx,pts,frac,lw,color){
  const n=Math.max(2,Math.round(pts.length*frac));
  if (n > pts.length) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<n;i++){
    if(i<n-1){
      const mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    } else ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.strokeStyle=color; ctx.lineWidth=lw;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.stroke();
}

function drawCrayon(ctx, crayonSet, cx, cy, r, frac, col){
  const total=crayonSet.length;
  const nFull=Math.floor(total*frac);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  ctx.strokeStyle=col; ctx.lineCap='round'; ctx.lineJoin='round';
  for(let i=0;i<nFull;i++){
    const pts=crayonSet[i];
    ctx.lineWidth=3.5+(i%3)*0.5;
    ctx.globalAlpha= (ctx.globalAlpha) * (0.8+(i%2)*0.1);
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let j=1;j<pts.length;j++) ctx.lineTo(pts[j].x,pts[j].y);
    ctx.stroke();
  }
  ctx.restore();
}

// SYNCHRONIZED HIGH-CONTRAST PALETTE
function crayonColor(g){
  if (g === 'input') return '#3d85c6';   // Structural/Chemical Inputs (Deep Blue)
  if (g === 'hidden') return '#f1c232';  // Interpretable Descriptors (Bright Yellow)
  return '#cc0000';                      // Target Prediction (Vivid Red)
}

// ─── ACT 1: ML ARCHITECTURE DATA (Neural Network Style) ──────────────────────
const ML_ATOMS = [];
const ML_BONDS = [];

// Layer 0: Input Features (Blue)
const L0 = [440, 540, 640];
L0.forEach(y => ML_ATOMS.push({ cx: 280, cy: y, r: 24, g: 'input', layer: 0 }));

// Layer 1: Hidden/Interpretable Descriptors (Yellow)
const L1 = [340, 440, 540, 640, 740];
L1.forEach(y => ML_ATOMS.push({ cx: 540, cy: y, r: 24, g: 'hidden', layer: 1 }));

// Layer 2: Output Property (Red)
const L2 = [540];
L2.forEach(y => ML_ATOMS.push({ cx: 800, cy: y, r: 28, g: 'target', layer: 2 }));

// Connect adjacent layers fully
ML_ATOMS.filter(a => a.layer === 0).forEach(a0 => {
    ML_ATOMS.filter(a => a.layer === 1).forEach(a1 => {
        ML_BONDS.push([a0.cx, a0.cy, a1.cx, a1.cy]);
    });
});
ML_ATOMS.filter(a => a.layer === 1).forEach(a1 => {
    ML_ATOMS.filter(a => a.layer === 2).forEach(a2 => {
        ML_BONDS.push([a1.cx, a1.cy, a2.cx, a2.cy]);
    });
});

const bondPts = ML_BONDS.map((b,i)=>bakeLine(b[0],b[1],b[2],b[3],i*113+5, 0.8)); // Less wobble for "network" edges
ML_ATOMS.forEach((a,i)=>{
  a.pts=bakeCircle(a.cx,a.cy,a.r,i*79+11);
  a.crayon1 = buildCrayon(a.cx, a.cy, a.r*0.85, i*333+77);
  if (a.g === 'target') a.crayon2 = buildCrayon(a.cx, a.cy, a.r*0.85, i*444+88);
});

// ─── ACT 2: PLOTS DATA (Centered 1080x1080 coords) ───────────────────────────
// 1. Parity Plot (Predicted vs DFT) - Left Side
const pY = bakeLine(200, 750, 200, 400, 501);
const pX = bakeLine(200, 750, 500, 750, 502);
const idealLine = bakeLine(200, 750, 500, 450, 503, 0.5);

// Generate tight cluster of scatter points around ideal line
const scatterPts = [];
for(let i=0; i<35; i++){
    let x = 240 + rng() * 220;
    let ideal_y = 950 - x; // y = -x + 950 gives (200,750) to (500,450)
    let y = ideal_y + (rng() - 0.5) * 45; // Wobbly noise (tight variance)
    scatterPts.push({
        x: x, y: y,
        pts: bakeCircle(x, y, 6, i*22),
        crayon: buildCrayon(x, y, 5, i*33)
    });
}

// 2. Feature Importance Plot (Interpretability) - Right Side
const fY = bakeLine(650, 750, 650, 400, 506);
const fX = bakeLine(650, 750, 950, 750, 507);

// Horizontal Bars
const bar1 = bakeLine(650, 480, 900, 480, 510, 0.5); // Top feature (Red)
const bar2 = bakeLine(650, 560, 820, 560, 511, 0.5);
const bar3 = bakeLine(650, 640, 760, 640, 512, 0.5);
const bar4 = bakeLine(650, 720, 710, 720, 513, 0.5);

// ─── PAPER BACKGROUND ────────────────────────────────────────────────────────
function drawPaper(ctx){
  ctx.fillStyle='#f0ece0'; ctx.fillRect(0,0,W,H);
  sr(777);
  const id=ctx.createImageData(W,H);
  for(let i=0;i<id.data.length;i+=4){
    const n=(rng()-.5)*18;
    id.data[i]=240+n; id.data[i+1]=236+n; id.data[i+2]=224+n; id.data[i+3]=255;
  }
  ctx.putImageData(id,0,0);
  const vg=ctx.createRadialGradient(W/2,H/2,W*.3,W/2,H/2,W*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.15)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}
drawPaper(pCtx);

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
let time = 0;
let rafId;

function animate() {
  time += 0.012;

  c.drawImage(paperOS, 0, 0);

  // ==========================================
  // ACT 1: ML ARCHITECTURE (t: 0.0 to 4.5)
  // ==========================================
  let latticeAlpha = 0;
  if (time < 3.5) latticeAlpha = 1.0;
  else if (time >= 3.5 && time < 4.5) latticeAlpha = Math.max(0, 1.0 - (time - 3.5));

  if (latticeAlpha > 0.01) {
    c.save();
    c.globalAlpha = latticeAlpha;

    // Draw edges mapping sequentially based on time
    let bondAlpha = time > 1.0 ? Math.max(0.15, 1.0 - (time - 1.0)*1.5) : 1.0;
    c.globalAlpha = bondAlpha * latticeAlpha;
    const bondDrawFrac = Math.min(1.0, time * 1.5);
    bondPts.forEach(pts => drawStroke(c, pts, bondDrawFrac, 2, '#444'));

    // Draw Nodes
    ML_ATOMS.forEach(a => {
      let alpha = (a.g !== 'target' && time > 1.0) ? Math.max(0.2, 1.0 - (time - 1.0)*1.5) : 1.0;
      c.globalAlpha = alpha * latticeAlpha;

      c.fillStyle = '#f0ece0';
      c.beginPath(); c.arc(a.cx, a.cy, a.r*0.85, 0, Math.PI*2); c.fill();

      const sketchFrac = Math.min(1.0, time * 1.2);
      drawCrayon(c, a.crayon1, a.cx, a.cy, a.r*0.85, sketchFrac, crayonColor(a.g));

      if (a.g === 'target' && time > 2.0) {
        const morphFrac = Math.min(1.0, (time - 2.0)*1.5);
        c.globalAlpha = morphFrac * latticeAlpha;
        drawCrayon(c, a.crayon2, a.cx, a.cy, a.r*0.85, 1.0, crayonColor('target'));
      }

      c.globalAlpha = alpha * latticeAlpha;
      drawStroke(c, a.pts, sketchFrac, 3, '#222');
    });
    c.restore();

    if(time < 4.5) {
        c.globalAlpha = latticeAlpha * Math.min(1.0, time);
        c.textAlign = 'center';
        c.font = 'bold 42px "Caveat", cursive';
        c.fillStyle = '#111';
        c.fillText("Physics-Informed Machine Learning Architecture", 540, 160);

        // Small labels for the architecture
        c.font = 'italic 18px Georgia, serif';
        c.fillStyle = '#444';
        c.fillText("Composition/Structure", 280, 770);
        c.fillText("Interpretable Descriptors", 540, 810);
        c.fillStyle = '#cc0000';
        c.fillText("Target Property", 800, 620);
    }
  }

  // ==========================================
  // ACT 2: PLOTS & VALIDATION (t: 4.0 to 9.5)
  // ==========================================
  let plotAlpha = 0;
  if (time >= 4.0 && time < 5.0) plotAlpha = time - 4.0;
  else if (time >= 5.0 && time < 8.5) plotAlpha = 1.0;
  else if (time >= 8.5 && time < 9.5) plotAlpha = Math.max(0, 1.0 - (time - 8.5));

  if (plotAlpha > 0.01) {
    c.globalAlpha = plotAlpha;
    c.textAlign = 'center';
    c.font = 'bold 42px "Caveat", cursive';
    c.fillStyle = '#111';
    c.fillText("Predictive Accuracy & Physical Interpretability", 540, 160);

    // -- PARITY PLOT (Left) --
    drawStroke(c, pY, 1.0, 3, '#444');
    drawStroke(c, pX, 1.0, 3, '#444');

    const pTime = time - 4.0;
    const drawBase = Math.min(1.0, pTime * 1.5);

    // Draw target ideal line
    drawStroke(c, idealLine, drawBase, 3, '#cc0000');

    // Draw scatter points
    scatterPts.forEach(pt => {
        c.globalAlpha = drawBase * plotAlpha;
        c.fillStyle = '#f0ece0';
        c.beginPath(); c.arc(pt.x, pt.y, 5, 0, Math.PI*2); c.fill();
        drawCrayon(c, pt.crayon, pt.x, pt.y, 5, drawBase, '#3d85c6'); // Deep blue points
        drawStroke(c, pt.pts, drawBase, 2, '#222');
    });

    c.font = 'italic 20px Georgia, serif'; c.fillStyle = '#444';
    c.fillText("Predicted Property", 160, 580); // Y-axis
    c.fillText("DFT Calculated", 350, 790); // X-axis

    // -- FEATURE IMPORTANCE PLOT (Right) --
    drawStroke(c, fY, 1.0, 3, '#444');
    drawStroke(c, fX, 1.0, 3, '#444');

    // Draw thick bars (line width 20)
    c.lineCap = 'round';
    drawStroke(c, bar2, drawBase, 20, '#3d85c6');
    drawStroke(c, bar3, drawBase, 20, '#3d85c6');
    drawStroke(c, bar4, drawBase, 20, '#3d85c6');

    if (time > 6.0) {
      const morph = Math.min(1.0, (time - 6.0)*1.5);
      c.globalAlpha = morph * plotAlpha;
      drawStroke(c, bar1, morph, 20, '#cc0000'); // Highlight top feature in Red

      c.font = 'bold 24px "Caveat", cursive'; c.fillStyle = '#cc0000';
      c.fillText("Dominant Physical Descriptor", 780, 440);
    }

    c.globalAlpha = plotAlpha;
    c.font = 'italic 20px Georgia, serif'; c.fillStyle = '#444';
    c.fillText("Relative Importance", 800, 790);
  }

  // ==========================================
  // ACT 3: TEXT SEQUENCE (t: 9.0 onwards)
  // ==========================================
  if (time > 9.0) {
    c.textAlign = 'center';

    c.globalAlpha = Math.min(1.0, (time - 9.0));
    c.font = 'bold 54px "Caveat", cursive';
    c.fillStyle = '#111';
    c.fillText("Data-Driven Materials Discovery", 540, 320);

    c.globalAlpha = Math.min(1.0, Math.max(0, time - 9.5));
    c.font = '36px "Caveat", cursive';
    c.fillStyle = '#cc0000'; // Match dopant color
    c.fillText("Accelerating screening without sacrificing physical insight", 540, 380);

    c.font = 'bold 30px "Caveat", cursive';
    c.fillStyle = '#333';

    if (time > 10.5) {
        c.globalAlpha = Math.min(1.0, (time - 10.5)*2);
        c.fillText("→ Integrates interpretable ML with DFT validation", 540, 520);
    }
    if (time > 11.5) {
        c.globalAlpha = Math.min(1.0, (time - 11.5)*2);
        c.fillText("→ Identifies defect-host systems for qubits (e.g., NV centers)", 540, 580);
    }
    if (time > 12.5) {
        c.globalAlpha = Math.min(1.0, (time - 12.5)*2);
        c.fillText("→ Achieves robust predictive metrics (F1 > 0.98, MCC > 0.90)", 540, 640);
    }

    if (time > 13.5) {
        c.globalAlpha = Math.min(1.0, (time - 13.5)*2);
        c.font = 'italic 22px Georgia, serif';
        c.fillStyle = '#666';
        c.fillText("Framework applied to Qubits, Catalysts & Functional Alloys", 540, 800);
    }
  }

  c.globalAlpha = 1.0;

  if (time < 16.0) {
    rafId = requestAnimationFrame(animate);
  }
}

function restart() {
  cancelAnimationFrame(rafId);
  time = 0;
  animate();
}

setTimeout(() => restart(), 300);

</script>
</body>
</html>
