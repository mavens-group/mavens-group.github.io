name: Deploy MAVENs Group site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.153.2
      HUGO_ENVIRONMENT: production
      HUGO_ENV: production
      DART_SASS_VERSION: 1.77.6

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set timezone
        run: sudo timedatectl set-timezone America/Los_Angeles

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
          https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # Cache Dart Sass binary by version
      - name: Cache Dart Sass
        id: cache-dart-sass
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sass
          key: dart-sass-${{ env.DART_SASS_VERSION }}-linux-x64

      - name: Install Dart Sass
        if: steps.cache-dart-sass.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz \
            | tar -xz -C /usr/local/bin --strip-components=1 dart-sass/sass

      # Prepare directories so cache steps never fail on first run
      - name: Prepare Hugo cache directories
        run: |
          mkdir -p resources
          mkdir -p .hugo_cache
          mkdir -p /home/runner/.cache/hugo_cache

      # Cache Hugo modules (keyed on go.sum — only invalidates on dependency changes)
      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      # Cache generated images and resources (keyed on content — invalidates on any markdown change)
      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: |
            resources
            .hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public


  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
